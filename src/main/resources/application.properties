# Load optional local overrides first (see local-application.properties.example in project root)
spring.config.import=optional:file:./local-application.properties

spring.application.name=Phy6-Master

# Database Configuration

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/phy6_master2?createDatabaseIfNotExist=true}


spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/phy6_master?createDatabaseIfNotExist=true}

spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Maleesha@13}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
# If startup logs DDL error on password_reset_tokens (id column): run db/fix-password-reset-tokens.sql in MySQL, then restart.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB


# Stripe Configuration
# Set real values through environment variables.
stripe.api.key=${STRIPE_API_KEY}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
stripe.secret.key=${STRIPE_SECRET_KEY}

# Stripe Configuration
# Set real values through environment variables.
stripe.api.key=${STRIPE_API_KEY:}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}



# Stripe Checkout URLs
# These URLs will be used after successful/cancelled Stripe payment
stripe.success.url=${STRIPE_SUCCESS_URL:http://localhost:5173/student/payment-success}
stripe.cancel.url=${STRIPE_CANCEL_URL:http://localhost:5173/student/payment-cancel}


# Student chatbot OpenAI-compatible HTTP API (OpenAI, Groq free tier, or local Ollama)
openai.api.base-url=${OPENAI_BASE_URL:https://api.groq.com/openai/v1}
openai.api.key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:llama-3.1-8b-instant}

